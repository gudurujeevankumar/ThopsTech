<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissor</title>
</head>
<body>
    <p>Rock Paper Scissor</p>

    <button onclick="
        var ran = (Math.random())

        if (ran >= 0 && ran <= 1/3){
            console.log('rock', ran)
        }

        else if (ran > 1/3 && ran <= 2/3){
            console.log('paper', ran)
        }

        else {
            console.log('Scissor', ran)
        }
    ">Rock</button> 
    <button>Paper</button>
    <button>Scissor</button>
    <script src="script.js"></script>
</body>
</html>
