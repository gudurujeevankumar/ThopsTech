<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .parent {
            background-color: rgb(36, 167, 171);
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .parent div {
            height: 30px;
            width: 30px;
            border-radius: 5px;
            text-align: center;
            
            
        }

        .parent .items:nth-child(1) {
            background: red;
            align-self: flex-end;
        }

        .parent .items:nth-child(2) {
            background: blue;
        }

        .parent .items:nth-child(3) {
            background: green;
        }

        .parent .items:nth-child(4) {
            background: orange;
        }

    </style>
</head>

<body>
    <div class="parent">
        <div class="item-1 items">1</div>
        <div class="item-2 items">2</div>
        <div class="item-3 items">3</div>
        <div class="item-4 items">4</div>
    </div>
</body>

</html>
