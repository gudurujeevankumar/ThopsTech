<body>
    <!-- Create an HTML button and use inline CSS to make it red with white text and rounded corners. -->
   
    <button style="background-color: red;color: white;border-radius: 10px;"> Subscribe </button>


    <!-- Style a paragraph with inline CSS so it appears in blue, 18px font, and has 10px padding. -->
    
    <p style="color: blue; font-size: 18px; padding: 10px;">Lorem ipsum dolor sit amet consectetur adipisicing elit. Veniam, recusandae! Consequuntur pariatur animi molestias a excepturi optio est adipisci recusandae neque quasi! Hic nobis ipsam beatae, tempore eius consectetur saepe?</p>


    <!-- Design a small navigation menu with three links and style each using inline CSS with different background colors. -->
     
    <nav style="background-color: gray;">  <a style="background-color: yellow;" href="https://www.google.com/">Google</a>
            <a style="background-color: red;" href="https://www.youtube.com/">Youtube</a>
            <a style="background-color: skyblue;" href="https://www.facebook.com/">Facebook</a>
    </nav>

    <!-- Create a <div> that serves as a card. Use inline CSS to give it a shadow, border, and fixed width. -->

        <div style="height: 100px; width: 100px; border: solid 1px; box-shadow: 1px 1px 20px;" >
            
        </div>
