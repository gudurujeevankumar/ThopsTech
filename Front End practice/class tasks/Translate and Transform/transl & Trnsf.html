<!DOCTYPE html>
<head>
    <title>Translate and Transform</title>
    <style>
        #parent {
            height: 200px;
            width: 100%;
            background-color: aqua;
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .items {
            height: 100px;
            width: 100px;
            background-color: brown;
            animation-name: itemsu;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            
        }
        .items:hover {
            animation-play-state: paused;
        }

        @keyframes itemsu {
            from {
                transform: translateX(0px);
            }
            to {
                transform: translateX(100px);
            }
        }

    </style>
</head>
<body>
    <div id="parent">
        <div class="items" id="item-1"></div>
        <div class="items" id="item-2"></div>
        <div class="items" id="item-3"></div>
        <div class="items" id="item-4"></div>
        <div class="items" id="item-5"></div>
        <div class="items" id="item-6"></div>
        <div class="items" id="item-7"></div>
        <div class="items" id="item-8"></div>
        <div class="items" id="item-9"></div>
        <div class="items" id="item-10"></div>
    </div>
</body>
</html>
