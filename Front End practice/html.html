<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body {
            margin: 0px;
        }

        nav{
            background-color: gray;
            height: 50px;
            width: 100%;
            padding: 1px;
        }

        ul {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }

        li {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="https://www.google.com/">Home</a></li>
            <li>Contact</li>
            <li>Projects</li>
            <li>Experence</li>
        </ul>
    </nav>
</body>
</html>
